# 정지은 일산 ABA — production stack.
#   docker compose up -d --build            # db + app (app applies migrations on start)
#   docker compose exec app npm run db:seed  # one-off seed (first deploy only)
#   docker compose --profile proxy up -d     # also run Nginx (static front + reverse proxy)
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aba_password}
      POSTGRES_DB: ${POSTGRES_DB:-aba}
      TZ: Asia/Seoul
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-aba} -d ${POSTGRES_DB:-aba}']
      interval: 5s
      timeout: 5s
      retries: 10
    # DB is not published to the host in production — only `app` reaches it over the
    # compose network. Uncomment for local psql/debugging:
    # ports: ['5432:5432']

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override .env's localhost DATABASE_URL — inside compose the DB host is `db`.
      DATABASE_URL: postgresql://${POSTGRES_USER:-aba}:${POSTGRES_PASSWORD:-aba_password}@db:5432/${POSTGRES_DB:-aba}?schema=public
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/storage/uploads
    ports:
      - '${PORT:-4000}:4000'

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [app]
    ports:
      - '80:80'
      # - '443:443'   # enable after mounting TLS certs (see DEPLOY.md)
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount the frontend ROOT (front-jungAba) so /ui_kits/website/* and /assets/* both resolve.
      - ${STATIC_ROOT_HOST:-../front-jungAba}:/usr/share/nginx/html:ro
      # Same volume the app writes uploads to — Nginx serves them directly.
      - uploads:/usr/share/nginx/uploads:ro
    profiles: ['proxy']

volumes:
  pgdata:
  uploads:
