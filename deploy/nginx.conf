# 정지은 일산 ABA — Nginx reverse proxy (compose service "nginx").
# Serves the static SPA + assets, proxies /v1 to the Nest app, streams SSE, serves uploads.

upstream aba_app {
    server app:4000;
}

server {
    listen 80;
    server_name _;

    # Backend caps uploads at 5MB; allow a little headroom for multipart overhead.
    client_max_body_size 6m;

    # Web root = the design-system dir, so BOTH the page (/ui_kits/website/*) and the
    # images it references as ../../assets/… (→ /assets/*) resolve as static files.
    root /usr/share/nginx/html;

    # Landing → the marketing page.
    location = / {
        return 302 /ui_kits/website/index.html;
    }

    # ── SSE: must come before /v1/ (longest-prefix wins). Buffering off, long timeouts. ──
    location /v1/realtime/ {
        proxy_pass http://aba_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # ── REST API ──
    location /v1/ {
        proxy_pass http://aba_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Uploaded files: served straight from the shared volume (no proxy hop). ──
    location /uploads/ {
        alias /usr/share/nginx/uploads/;
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    # ── Static site + assets (served from root: /ui_kits/website/*, /assets/*, css/js). ──
    location / {
        try_files $uri $uri/ =404;
    }
}
