# 정지은 일산 ABA — Nginx (compose service "nginx"): API 리버스 프록시 전용.
# 프론트는 Vercel에 별도 호스팅, 업로드 이미지는 S3 → nginx는 /v1 프록시 + (운영 시) TLS 종단 용도.

upstream aba_app {
    server app:4000;
}

server {
    listen 80;
    server_name _;

    # 업로드 5MB + 멀티파트 여유
    client_max_body_size 6m;

    # ── SSE: /v1/ 보다 먼저 (최장 prefix 우선). 버퍼링 off, 긴 타임아웃. ──
    location /v1/realtime/ {
        proxy_pass http://aba_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding off;
    }

    # ── 그 외 전부 앱으로 (REST /v1/*, 로컬 업로드 fallback 등). CORS 헤더는 Nest 앱이 추가. ──
    location / {
        proxy_pass http://aba_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
