name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: aba
          POSTGRES_PASSWORD: aba_password
          POSTGRES_DB: aba_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aba -d aba_test"
          --health-interval 5s --health-timeout 5s --health-retries 12

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://aba:aba_password@localhost:5432/aba_test?schema=public
      JWT_SECRET: ci-test-secret-key-at-least-32-characters
      ADMIN_DEFAULT_USERNAME: testadmin
      ADMIN_DEFAULT_PASSWORD: testpass1234
      UPLOAD_DIR: storage/uploads-test
      CORS_ORIGINS: ''

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma schema validate
        run: npx prisma validate

      - name: Migration check (apply to a clean DB)
        run: npx prisma migrate deploy

      - name: Lint
        run: npm run lint:ci

      - name: Type check (build)
        run: npm run build

      - name: Tests + coverage gate (unit + integration + e2e)
        run: npm run test:cov
